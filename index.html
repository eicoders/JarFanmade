<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jar Fanmade</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        'primary': '#0078D4',
                        'primary-hover': '#0063b1',
                        'secondary': '#f3f4f6',
                        'accent': '#107c10',
                        'danger': '#d13438',
                        'dark-bg': '#1A1D21',
                        'dark-card': '#252A31',
                        'dark-border': '#3A404A',
                        'dark-text': '#EAEAEA',
                        'dark-subtext': '#9A9A9A',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    boxShadow: {
                        'soft': '0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03)',
                        'glow': '0 0 15px rgba(0, 120, 212, 0.3)',
                    },
                    animation: {
                        'rgb-border': 'rgb-border 3s linear infinite',
                    },
                    keyframes: {
                        'rgb-border': {
                            '0%, 100%': { borderColor: '#ff0000' },
                            '33%': { borderColor: '#00ff00' },
                            '66%': { borderColor: '#0000ff' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        /* --- Custom Slim Scrollbar (Only for History Lists) --- */
        .history-list {
            max-height: 350px; /* Fixed height for internal scroll */
            overflow-y: auto;  /* Enable vertical scroll */
            padding-right: 5px;
        }

        /* Scrollbar styling specifically for Webkit (Chrome/Safari/Android WebView) */
        .history-list::-webkit-scrollbar {
            width: 4px; /* Very thin */
        }
        .history-list::-webkit-scrollbar-track {
            background: transparent; 
        }
        .history-list::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 10px;
        }
        .dark .history-list::-webkit-scrollbar-thumb {
            background: #4b5563;
        }
        /* Auto-hide effect: Thumb becomes transparent when inactive (supported in modern browsers) */
        .history-list {
            scrollbar-color: #cbd5e1 transparent;
            scrollbar-width: thin;
        }

        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s ease, color 0.3s ease; }
        
        *, *::before, *::after {
            transition-property: background-color, border-color, color, fill, stroke;
            transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
            transition-duration: 200ms;
        }

        /* RGB Animation for Login Button */
        .rgb-btn {
            background: linear-gradient(45deg, #ff357a, #fff172, #0078D4, #ff357a);
            background-size: 400% 400%;
            animation: rgb-move 4s ease infinite;
            color: white !important;
            border: none !important;
            font-weight: 800 !important;
            letter-spacing: 0.5px;
        }

        @keyframes rgb-move {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .profile-avatar {
            object-fit: cover;
            width: 100%;
            height: 100%;
        }
        
        /* Fallback Avatar Style */
        .fallback-avatar {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .disabled-btn {
            opacity: 0.5;
            cursor: not-allowed;
            filter: grayscale(100%);
        }
    </style>

    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'system';
            if (savedTheme === 'dark' || (savedTheme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        })();
    </script>
</head>

<body class="bg-gray-50 text-gray-900 dark:bg-dark-bg dark:text-dark-text">

    <header class="fixed top-0 w-full z-50 bg-white/90 dark:bg-dark-bg/95 backdrop-blur-md border-b border-gray-200 dark:border-dark-border shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex-shrink-0 flex items-center gap-2">
                    <div class="w-8 h-8 bg-primary rounded-lg flex items-center justify-center text-white font-bold text-xl shadow-glow">J</div>
                    <h1 class="text-2xl font-bold tracking-tight text-gray-900 dark:text-white">Jar <span class="text-primary font-normal">Ledger</span></h1>
                </div>

                <div class="relative" id="user-action-container">
                    <button id="user-action-button" class="group relative flex items-center justify-center overflow-hidden border-2 border-gray-200 dark:border-gray-600 hover:border-primary dark:hover:border-primary focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all duration-300">
                        </button>
                    
                    <span id="login-status-dot" class="absolute bottom-0 right-0 block h-3 w-3 rounded-full ring-2 ring-white dark:ring-dark-bg bg-gray-400 z-10 hidden"></span>

                    <div id="profile-dropdown" class="hidden absolute right-0 mt-2 w-64 bg-white dark:bg-dark-card rounded-xl shadow-xl border border-gray-100 dark:border-dark-border transform origin-top-right transition-all duration-200 z-50">
                        
                        <div class="p-4 border-b border-gray-100 dark:border-dark-border">
                            <p class="text-xs font-medium text-gray-500 dark:text-dark-subtext uppercase tracking-wider mb-1">Signed in as</p>
                            <p id="user-email-display" class="text-sm font-semibold text-gray-900 dark:text-white truncate">Guest</p>
                        </div>

                        <div class="py-2">
                            <button id="theme-toggle-btn" class="w-full flex items-center px-4 py-3 text-sm text-gray-700 dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-dark-border/50 transition-colors">
                                <div id="theme-icon-container" class="mr-3 text-primary"></div>
                                <span class="flex-grow text-left font-medium">Appearance</span>
                                <span id="theme-label" class="text-xs text-gray-400 dark:text-gray-500 font-medium bg-gray-100 dark:bg-dark-border px-2 py-0.5 rounded">System</span>
                            </button>

                            <button id="dropdown-logout-btn" class="w-full flex items-center px-4 py-3 text-sm text-danger hover:bg-red-50 dark:hover:bg-red-900/20 transition-colors">
                                <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H3m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"></path></svg>
                                <span class="font-bold">Sign Out</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="pt-24 pb-12 px-4 sm:px-6 lg:px-8 max-w-7xl mx-auto space-y-8" id="app-content-area">
        
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            
            <div class="lg:col-span-8 bg-white dark:bg-dark-card p-6 rounded-2xl shadow-soft border border-gray-100 dark:border-dark-border">
                <h2 class="text-lg font-bold text-gray-900 dark:text-white mb-4 flex items-center">
                    <span class="bg-blue-100 dark:bg-blue-900/30 text-primary p-1.5 rounded-lg mr-3"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg></span>
                    Select Client
                </h2>
                <div class="flex flex-col sm:flex-row gap-4">
                    <div class="relative flex-grow">
                        <input type="text" id="client-search-input" placeholder="Filter clients..." class="w-full pl-10 pr-4 py-3 rounded-xl border border-gray-200 dark:border-dark-border bg-gray-50 dark:bg-dark-bg text-gray-900 dark:text-white focus:ring-2 focus:ring-primary focus:border-transparent transition-shadow">
                        <svg class="w-5 h-5 text-gray-400 absolute left-3 top-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    </div>
                    <select id="client-selector" class="w-full sm:w-1/3 p-3 rounded-xl border border-gray-200 dark:border-dark-border bg-white dark:bg-dark-bg text-gray-900 dark:text-white focus:ring-2 focus:ring-primary font-medium"></select>
                </div>
            </div>

            <div id="client-utility-card" class="lg:col-span-4 bg-white dark:bg-dark-card p-6 rounded-2xl shadow-soft border border-gray-100 dark:border-dark-border flex flex-col justify-between">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-lg font-bold text-gray-900 dark:text-white">Client Utility</h2>
                    <span class="text-xs font-semibold bg-primary/10 text-primary px-2 py-1 rounded">Manage</span>
                </div>
                
                <div class="space-y-3">
                    <button id="add-new-client-btn" class="w-full py-3 bg-primary hover:bg-primary-hover text-white font-semibold rounded-xl shadow-md hover:shadow-lg transition-all flex items-center justify-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                        New Client
                    </button>

                    <div class="flex gap-3">
                        <button id="rename-client-btn" class="flex-1 py-2.5 bg-gray-100 dark:bg-dark-border text-gray-700 dark:text-white font-medium rounded-lg hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors text-sm flex items-center justify-center gap-1 disabled-btn" disabled>
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                            Rename
                        </button>
                        <button id="delete-client-btn" class="flex-1 py-2.5 bg-red-50 dark:bg-red-900/20 text-danger font-medium rounded-lg hover:bg-red-100 dark:hover:bg-red-900/40 transition-colors text-sm flex items-center justify-center gap-1 disabled-btn" disabled>
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                            Delete
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div id="content-area-main-structure">
            <div class="flex items-center justify-between border-b border-gray-200 dark:border-dark-border pb-4 mb-8">
                <div>
                    <p class="text-sm font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wide">Active Ledger</p>
                    <h2 class="text-3xl font-extrabold text-gray-900 dark:text-white mt-1" id="active-client-display">Loading...</h2>
                </div>
                <div class="hidden md:block">
                    <span class="inline-flex items-center px-3 py-1 rounded-full text-sm font-medium bg-green-100 text-green-800 dark:bg-green-900/30 dark:text-green-400">
                        <span class="w-2 h-2 bg-green-500 rounded-full mr-2"></span> Active
                    </span>
                </div>
            </div>

            <div id="summary-results" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
                </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
                
                <div class="bg-white dark:bg-dark-card p-6 rounded-2xl shadow-soft border border-gray-100 dark:border-dark-border">
                    <h3 class="text-lg font-bold text-gray-900 dark:text-white mb-4 flex items-center">
                        <span class="bg-blue-100 dark:bg-blue-900/30 text-primary p-1.5 rounded-lg mr-3"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg></span>
                        Add Time
                    </h3>
                    <div class="grid grid-cols-3 gap-3 mb-4">
                        <div>
                            <label class="text-xs text-gray-500 dark:text-gray-400 font-medium ml-1">Hours</label>
                            <input type="number" id="task-hr-input" placeholder="0" min="0" class="client-dependent-input w-full p-3 text-center text-lg font-bold rounded-xl border border-gray-200 dark:border-dark-border bg-gray-50 dark:bg-dark-bg text-gray-900 dark:text-white focus:ring-2 focus:ring-primary focus:border-transparent">
                        </div>
                        <div>
                            <label class="text-xs text-gray-500 dark:text-gray-400 font-medium ml-1">Minutes</label>
                            <input type="number" id="task-min-input" placeholder="0" min="0" max="59" class="client-dependent-input w-full p-3 text-center text-lg font-bold rounded-xl border border-gray-200 dark:border-dark-border bg-gray-50 dark:bg-dark-bg text-gray-900 dark:text-white focus:ring-2 focus:ring-primary focus:border-transparent">
                        </div>
                        <div>
                            <label class="text-xs text-gray-500 dark:text-gray-400 font-medium ml-1">Seconds</label>
                            <input type="number" id="task-sec-input" placeholder="0" min="0" max="59" class="client-dependent-input w-full p-3 text-center text-lg font-bold rounded-xl border border-gray-200 dark:border-dark-border bg-gray-50 dark:bg-dark-bg text-gray-900 dark:text-white focus:ring-2 focus:ring-primary focus:border-transparent">
                        </div>
                    </div>
                    <button onclick="addTask()" class="client-dependent-btn w-full py-3 bg-primary hover:bg-primary-hover text-white font-bold rounded-xl shadow-md transition-all transform active:scale-95">
                        ADD BILLED TIME
                    </button>
                </div>

                <div class="bg-white dark:bg-dark-card p-6 rounded-2xl shadow-soft border border-gray-100 dark:border-dark-border">
                    <h3 class="text-lg font-bold text-gray-900 dark:text-white mb-4 flex items-center">
                        <span class="bg-green-100 dark:bg-green-900/30 text-accent p-1.5 rounded-lg mr-3"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 9V7a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2m2 4h10a2 2 0 002-2v-6a2 2 0 00-2-2H9a2 2 0 00-2 2v6a2 2 0 002 2z"></path></svg></span>
                        Add Deposit
                    </h3>
                    <div class="mb-4">
                        <label class="text-xs text-gray-500 dark:text-gray-400 font-medium ml-1">Amount (₹)</label>
                        <input type="number" id="payment-amount-input" placeholder="₹ 0.00" min="0" class="client-dependent-input w-full p-3 text-lg font-bold text-accent rounded-xl border border-gray-200 dark:border-dark-border bg-gray-50 dark:bg-dark-bg focus:ring-2 focus:ring-accent focus:border-transparent">
                    </div>
                    <button onclick="addPayment()" class="client-dependent-btn w-full py-3 bg-accent hover:bg-green-700 text-white font-bold rounded-xl shadow-md transition-all transform active:scale-95">
                        ADD DEPOSIT
                    </button>
                </div>
            </div>

            <div class="space-y-8">
                <div class="bg-white dark:bg-dark-card p-6 rounded-2xl shadow-soft border border-gray-100 dark:border-dark-border flex flex-col md:flex-row items-end gap-4">
                    <div class="flex-grow w-full">
                        <label class="text-sm font-medium text-gray-600 dark:text-gray-400 mb-1 block">Hourly Rate (₹)</label>
                        <input type="number" id="hourly-rate-input" class="client-dependent-input w-full p-3 rounded-lg border border-gray-200 dark:border-dark-border bg-gray-50 dark:bg-dark-bg text-gray-900 dark:text-white font-bold">
                    </div>
                    <button onclick="updateHourlyRate()" class="client-dependent-btn px-6 py-3 bg-gray-800 dark:bg-gray-700 text-white font-semibold rounded-lg hover:bg-black dark:hover:bg-gray-600 transition-colors w-full md:w-auto">
                        Update Rate
                    </button>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                    <div class="bg-white dark:bg-dark-card rounded-2xl shadow-soft border border-gray-100 dark:border-dark-border flex flex-col">
                        <div class="p-4 border-b border-gray-100 dark:border-dark-border">
                            <h3 class="text-lg font-bold text-gray-900 dark:text-white flex items-center">
                                <svg class="w-5 h-5 mr-2 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path></svg>
                                Task History
                            </h3>
                        </div>
                        <div id="task-list" class="history-list flex-grow p-1 space-y-1"></div>
                    </div>
                    
                    <div class="bg-white dark:bg-dark-card rounded-2xl shadow-soft border border-gray-100 dark:border-dark-border flex flex-col">
                        <div class="p-4 border-b border-gray-100 dark:border-dark-border">
                            <h3 class="text-lg font-bold text-gray-900 dark:text-white flex items-center">
                                <svg class="w-5 h-5 mr-2 text-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                Payment History
                            </h3>
                        </div>
                        <div id="payment-list" class="history-list flex-grow p-1 space-y-1"></div>
                    </div>
                </div>
            </div>
            
            <div id="welcome-message" class="hidden text-center py-20">
                </div>
        </div>
    </main>

    <div id="auth-modal-backdrop" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-[60] flex items-center justify-center p-4">
        <div class="bg-white dark:bg-dark-card w-full max-w-md rounded-2xl shadow-2xl border border-gray-200 dark:border-dark-border overflow-hidden transform transition-all scale-100">
            <div class="p-8">
                <div class="flex justify-between items-center mb-6">
                    <h2 id="auth-title" class="text-2xl font-bold text-gray-900 dark:text-white">Welcome Back</h2>
                    <button onclick="hideAuthModal()" class="text-gray-400 hover:text-gray-600 dark:hover:text-white transition-colors">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                </div>

                <button onclick="signInWithGoogle()" class="w-full flex items-center justify-center gap-3 bg-white dark:bg-gray-700 border border-gray-300 dark:border-gray-600 text-gray-700 dark:text-white font-semibold py-3 rounded-xl hover:bg-gray-50 dark:hover:bg-gray-600 transition-colors mb-6">
                    <svg class="w-5 h-5" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg"><g fill="none" fill-rule="evenodd"><path d="M17.64 9.2045c0-.6381-.0573-1.2518-.1698-1.8409H9v3.4818h4.8436c-.2086 1.125-.8427 2.0782-1.7959 2.7164v2.26h2.9082c1.7018-1.5668 2.68-3.8732 2.68-6.6191z" fill="#4285F4"/><path d="M9 18c2.43 0 4.47-.8032 5.96-2.1764L12.0518 13.56c-.8032.5409-1.8395.8618-3.0518.8618-2.3441 0-4.3282-1.5818-5.0359-3.7109H.9v2.33C2.3909 15.9832 5.4282 18 9 18z" fill="#34A853"/><path d="M3.9641 10.71c-.1818-.5409-.2836-1.1164-.2836-1.71s.1018-1.1691.2836-1.71V4.95H.9C.3273 6.1364 0 7.5232 0 9s.3273 2.8636.9 4.05l3.0641-2.33z" fill="#FBBC05"/><path d="M9 3.5782c1.3236 0 2.5082.4555 3.4409 1.3536l2.5809-2.5809C13.46.8559 11.4236 0 9 0 5.4282 0 2.3909 2.0168.9 5.04L3.9641 7.37c.7077-2.1291 2.6918-3.7918 5.0359-3.7918z" fill="#EA4335"/></g></svg>
                    Continue with Google
                </button>

                <div class="relative mb-6">
                    <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-200 dark:border-dark-border"></div></div>
                    <div class="relative flex justify-center text-sm"><span class="px-2 bg-white dark:bg-dark-card text-gray-500">Or continue with email</span></div>
                </div>

                <div class="space-y-4">
                    <input type="email" id="auth-email" placeholder="Email address" class="w-full p-3 bg-gray-50 dark:bg-dark-bg border border-gray-200 dark:border-dark-border rounded-xl text-gray-900 dark:text-white focus:ring-2 focus:ring-primary focus:border-transparent outline-none">
                    <input type="password" id="auth-password" placeholder="Password" class="w-full p-3 bg-gray-50 dark:bg-dark-bg border border-gray-200 dark:border-dark-border rounded-xl text-gray-900 dark:text-white focus:ring-2 focus:ring-primary focus:border-transparent outline-none">
                    <button id="auth-submit-btn" class="w-full py-3 bg-primary text-white font-bold rounded-xl shadow-lg hover:bg-primary-hover transition-colors">Log In</button>
                </div>
                
                <div class="mt-6 text-center">
                    <button id="auth-toggle-link" class="text-sm text-primary hover:text-primary-hover font-semibold">Don't have an account? Sign Up</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

            storageBucket: "jar-ledger.firebasestorage.app",
            messagingSenderId: "915159281904",
            appId: "1:915159281904:web:4f3d5c940a03c4b525d235",
            measurementId: "G-YB740FJBBG"
        };

        let database, auth;
        let clientLedgersRef = null;
        let currentUserId = null;
        let isLoginMode = true;
        let isFirebaseReady = false;

        const DEFAULT_CLIENT_NAME = 'Default Client';
        let clientLedgers = { activeClientName: DEFAULT_CLIENT_NAME, clients: { [DEFAULT_CLIENT_NAME]: { tasks: [], payments: [], settings: { hourlyRate: 150 } } } };

        // --- THEME SYSTEM (No Refresh) ---
        const themeIcons = {
            light: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>',
            dark: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>',
            system: '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>'
        };

        function updateThemeUI(theme) {
            const iconContainer = document.getElementById('theme-icon-container');
            const label = document.getElementById('theme-label');
            
            if (theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
            
            if(iconContainer) iconContainer.innerHTML = themeIcons[theme];
            if(label) label.textContent = theme.charAt(0).toUpperCase() + theme.slice(1);
        }

        function toggleTheme() {
            const current = localStorage.getItem('theme') || 'system';
            const cycle = ['system', 'light', 'dark'];
            const next = cycle[(cycle.indexOf(current) + 1) % cycle.length];
            localStorage.setItem('theme', next);
            updateThemeUI(next);
        }

        // --- INITIALIZATION ---
        try {
            firebase.initializeApp(firebaseConfig);
            database = firebase.database();
            auth = firebase.auth();
            isFirebaseReady = true;
        } catch (e) {
            console.error("Firebase Init Error:", e);
            alert("Error connecting to cloud services.");
        }

        // --- AUTH STATE & PROFILE UI ---
        auth.onAuthStateChanged(user => {
            const btn = document.getElementById('user-action-button');
            const dot = document.getElementById('login-status-dot');
            const emailDisplay = document.getElementById('user-email-display');

            if (user) {
                currentUserId = user.uid;
                emailDisplay.textContent = user.email;
                dot.classList.remove('bg-gray-400', 'hidden');
                dot.classList.add('bg-green-500');
                
                // Remove RGB animation class and reset styles
                btn.classList.remove('rgb-btn');
                btn.style.width = '2.5rem'; // 10 (w-10)
                btn.style.borderRadius = '9999px'; // rounded-full
                
                // PROFESSIONAL PROFILE PHOTO LOGIC
                if (user.photoURL) {
                    btn.innerHTML = `<img src="${user.photoURL}" alt="Profile" class="profile-avatar">`;
                } else {
                    // Email Login Avatar Fallback
                    const initial = user.email.charAt(0).toUpperCase();
                    btn.innerHTML = `<div class="fallback-avatar">${initial}</div>`;
                }

                btn.onclick = toggleProfileDropdown;
                
                // Load Cloud Data
                clientLedgersRef = database.ref(`users/${currentUserId}/clientLedgers`);
                startRealtimeListener();
            } else {
                // Guest Mode
                currentUserId = null;
                clientLedgersRef = null;
                emailDisplay.textContent = "Guest (Not Synced)";
                dot.classList.add('hidden');
                
                // RGB ANIMATION LOGIN BUTTON
                btn.classList.add('rgb-btn');
                btn.style.width = 'auto';
                btn.style.borderRadius = '0.75rem'; // rounded-xl
                btn.style.padding = '0 16px';
                btn.innerHTML = `LOG IN`;
                
                btn.onclick = showAuthModal;
                
                // Load Local Data
                const localData = JSON.parse(localStorage.getItem('jarLocalDefaultClient'));
                clientLedgers = { 
                    activeClientName: DEFAULT_CLIENT_NAME, 
                    clients: { [DEFAULT_CLIENT_NAME]: localData || { tasks: [], payments: [], settings: { hourlyRate: 150 } } } 
                };
                renderAllClientData();
            }
        });

        // --- DATA LOGIC (FIXED CALCULATIONS) ---
        const getOrCreateClientData = (name) => {
            if (!clientLedgers.clients[name]) {
                clientLedgers.clients[name] = { tasks: [], payments: [], settings: { hourlyRate: 150 } };
            }
            return clientLedgers.clients[name];
        };

        // Function to safely get numeric input
        const getNum = (id) => {
            const val = document.getElementById(id).value;
            return parseFloat(val === "" ? 0 : val);
        };

        const addTask = () => {
            const hr = getNum('task-hr-input');
            const min = getNum('task-min-input');
            const sec = getNum('task-sec-input');

            if (hr === 0 && min === 0 && sec === 0) return alert("Enter a duration.");
            if (hr < 0 || min < 0 || sec < 0) return alert("Negative time not allowed.");

            const clientData = getOrCreateClientData(clientLedgers.activeClientName);
            if (!clientData.tasks) clientData.tasks = [];

            clientData.tasks.push({
                hours: hr, minutes: min, seconds: sec,
                decimalHours: hr + (min / 60) + (sec / 3600),
                date: new Date().toISOString(),
                timestamp: Date.now()
            });

            clearInputs(['task-hr-input', 'task-min-input', 'task-sec-input']);
            persistData();
        };

        const addPayment = () => {
            const amount = getNum('payment-amount-input');
            if (amount <= 0) return alert("Enter valid amount.");

            const clientData = getOrCreateClientData(clientLedgers.activeClientName);
            if (!clientData.payments) clientData.payments = [];
            
            clientData.payments.push({ 
                amount: amount, 
                date: new Date().toISOString(), 
                timestamp: Date.now() 
            });

            clearInputs(['payment-amount-input']);
            persistData();
        };

        const persistData = () => {
            renderAllClientData();
            if (currentUserId && clientLedgersRef) {
                const dataToSave = JSON.parse(JSON.stringify(clientLedgers));
                delete dataToSave.clients[DEFAULT_CLIENT_NAME];
                clientLedgersRef.set(dataToSave);
            } else if (clientLedgers.clients[DEFAULT_CLIENT_NAME]) {
                localStorage.setItem('jarLocalDefaultClient', JSON.stringify(clientLedgers.clients[DEFAULT_CLIENT_NAME]));
            }
        };

        // --- CLIENT MANAGEMENT ACTIONS ---
        const renameClient = () => {
            const oldName = clientLedgers.activeClientName;
            if (!oldName || oldName === DEFAULT_CLIENT_NAME) return;
            
            let newName = prompt(`Rename "${oldName}" to:`);
            if (newName && newName.trim() !== "" && newName.trim() !== oldName) {
                newName = newName.trim();
                if (newName === DEFAULT_CLIENT_NAME || clientLedgers.clients[newName]) {
                    alert("Client name exists or invalid.");
                    return;
                }
                clientLedgers.clients[newName] = clientLedgers.clients[oldName];
                delete clientLedgers.clients[oldName];
                clientLedgers.activeClientName = newName;
                persistData();
            }
        };

        const deleteClient = () => {
            const target = clientLedgers.activeClientName;
            if (!target || target === DEFAULT_CLIENT_NAME) return;
            
            if (confirm(`Delete "${target}" and all its data permanently?`)) {
                delete clientLedgers.clients[target];
                // Switch to another client or default
                const keys = Object.keys(clientLedgers.clients);
                clientLedgers.activeClientName = keys.length > 0 ? keys[0] : DEFAULT_CLIENT_NAME;
                persistData();
            }
        };

        document.getElementById('rename-client-btn').onclick = renameClient;
        document.getElementById('delete-client-btn').onclick = deleteClient;

        document.getElementById('add-new-client-btn').onclick = () => {
            const name = prompt("New Client Name:");
            if (name && name.trim()) {
                const trimmed = name.trim();
                if (!clientLedgers.clients[trimmed]) {
                    clientLedgers.activeClientName = trimmed;
                    persistData();
                } else {
                    alert("Client already exists.");
                }
            }
        };

        // --- UI RENDERING ---
        const renderAllClientData = () => {
            renderClientSelector();
            const clientName = clientLedgers.activeClientName;
            const data = clientLedgers.clients[clientName];
            
            if (!data) return;

            document.getElementById('active-client-display').textContent = clientName;
            document.getElementById('hourly-rate-input').value = data.settings.hourlyRate;

            const tasks = Object.values(data.tasks || {});
            const payments = Object.values(data.payments || {});
            
            const totalHours = tasks.reduce((sum, t) => sum + t.decimalHours, 0);
            const totalBilled = totalHours * data.settings.hourlyRate;
            const totalPaid = payments.reduce((sum, p) => sum + p.amount, 0);
            const balance = totalBilled - totalPaid;

            // Summary
            const createCard = (label, value, colorClass) => `
                <div class="bg-white dark:bg-dark-card p-4 rounded-xl shadow-sm border border-gray-100 dark:border-dark-border text-center">
                    <p class="text-xs font-bold text-gray-500 dark:text-gray-400 uppercase">${label}</p>
                    <p class="text-2xl font-extrabold mt-1 ${colorClass}">${value}</p>
                </div>`;

            const balanceColor = balance > 0 ? 'text-accent' : (balance < 0 ? 'text-danger' : 'text-gray-600 dark:text-gray-300');
            
            document.getElementById('summary-results').innerHTML = 
                createCard('Total Hours', formatTime(totalHours), 'text-primary') +
                createCard('Total Billed', formatCurrency(totalBilled), 'text-gray-800 dark:text-white') +
                createCard('Received', formatCurrency(totalPaid), 'text-accent') +
                createCard('Net Balance', formatCurrency(balance), balanceColor);

            // Task List (With Sr No & Client Name)
            renderList('task-list', tasks, (t, i) => `
                <div class="flex justify-between items-center">
                    <div>
                        <p class="font-bold text-gray-800 dark:text-white text-sm">
                           <span class="text-primary mr-1">${i}.</span> ${clientName}
                        </p>
                        <p class="text-xs text-gray-500">${t.hours}h ${t.minutes}m ${t.seconds}s • ${new Date(t.date).toLocaleDateString()}</p>
                    </div>
                    <div class="text-right">
                        <p class="font-bold text-primary text-sm">${formatCurrency(t.decimalHours * data.settings.hourlyRate)}</p>
                        <button onclick="deleteItem('tasks', ${t.timestamp})" class="text-danger text-xs hover:underline mt-1">Delete</button>
                    </div>
                </div>
            `);

            // Payment List (Amount Received + Sr No)
            renderList('payment-list', payments, (p, i) => `
                <div class="flex justify-between items-center">
                    <div>
                        <p class="font-bold text-gray-800 dark:text-white text-sm">
                             <span class="text-primary mr-1">${i}.</span> Amount Received
                        </p>
                        <p class="text-xs text-gray-500">${new Date(p.date).toLocaleDateString()}</p>
                    </div>
                    <div class="text-right">
                        <p class="font-bold text-accent text-sm">${formatCurrency(p.amount)}</p>
                        <button onclick="deleteItem('payments', ${p.timestamp})" class="text-danger text-xs hover:underline mt-1">Delete</button>
                    </div>
                </div>
            `);
        };

        // --- UTILS ---
        const formatCurrency = (num) => new Intl.NumberFormat('en-IN', { style: 'currency', currency: 'INR' }).format(num);
        const formatTime = (dec) => {
            const h = Math.floor(dec);
            const m = Math.floor((dec - h) * 60);
            return `${h}h ${m}m`;
        };
        const clearInputs = (ids) => ids.forEach(id => document.getElementById(id).value = '');
        
        const renderList = (id, items, rowHtml) => {
            const el = document.getElementById(id);
            if (items.length === 0) {
                el.innerHTML = `<p class="text-center text-sm text-gray-400 py-8">No entries yet.</p>`;
                return;
            }
            // Sort descending, then map
            el.innerHTML = items.sort((a,b) => b.timestamp - a.timestamp).map((item, idx) => {
                // Sr No: Total items - current index (since it's sorted desc)
                const srNo = items.length - idx; 
                return `<div class="p-3 border-b border-gray-50 dark:border-white/5 hover:bg-gray-50 dark:hover:bg-dark-border/50 transition-colors last:border-0">${rowHtml(item, srNo)}</div>`;
            }).join('');
        };

        window.deleteItem = (type, ts) => {
            if(confirm("Delete this entry?")) {
                const data = getOrCreateClientData(clientLedgers.activeClientName);
                data[type] = data[type].filter(i => i.timestamp !== ts);
                persistData();
            }
        };

        window.updateHourlyRate = () => {
            const rate = getNum('hourly-rate-input');
            if(rate > 0) {
                getOrCreateClientData(clientLedgers.activeClientName).settings.hourlyRate = rate;
                persistData();
            }
        };

        const renderClientSelector = () => {
            const select = document.getElementById('client-selector');
            const filter = document.getElementById('client-search-input').value.toLowerCase();
            
            let clients = [DEFAULT_CLIENT_NAME];
            if (currentUserId) {
                clients = [DEFAULT_CLIENT_NAME, ...Object.keys(clientLedgers.clients).filter(c => c !== DEFAULT_CLIENT_NAME)];
            }

            select.innerHTML = clients
                .filter(c => c.toLowerCase().includes(filter))
                .map(c => `<option value="${c}" ${c === clientLedgers.activeClientName ? 'selected' : ''}>${c}</option>`)
                .join('');
            
            // Handle Client Utility Button States
            const isDefault = clientLedgers.activeClientName === DEFAULT_CLIENT_NAME;
            const renameBtn = document.getElementById('rename-client-btn');
            const deleteBtn = document.getElementById('delete-client-btn');

            renameBtn.disabled = isDefault;
            deleteBtn.disabled = isDefault;
            
            if (isDefault) {
                renameBtn.classList.add('disabled-btn');
                deleteBtn.classList.add('disabled-btn');
            } else {
                renameBtn.classList.remove('disabled-btn');
                deleteBtn.classList.remove('disabled-btn');
            }
        };

        document.getElementById('client-selector').onchange = (e) => {
            clientLedgers.activeClientName = e.target.value;
            persistData();
        };
        document.getElementById('client-search-input').oninput = renderClientSelector;

        // Auth & UI Toggles
        const showAuthModal = () => document.getElementById('auth-modal-backdrop').classList.remove('hidden');
        window.hideAuthModal = () => document.getElementById('auth-modal-backdrop').classList.add('hidden');
        window.toggleProfileDropdown = () => document.getElementById('profile-dropdown').classList.toggle('hidden');
        
        document.getElementById('auth-toggle-link').onclick = () => {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-title').textContent = isLoginMode ? "Welcome Back" : "Create Account";
            document.getElementById('auth-submit-btn').textContent = isLoginMode ? "Log In" : "Sign Up";
            document.getElementById('auth-toggle-link').textContent = isLoginMode ? "Don't have an account? Sign Up" : "Already have an account? Log In";
        };

        document.getElementById('auth-submit-btn').onclick = () => {
            const e = document.getElementById('auth-email').value;
            const p = document.getElementById('auth-password').value;
            if(!e || !p) return alert("Fill all fields");
            
            const action = isLoginMode ? auth.signInWithEmailAndPassword(e, p) : auth.createUserWithEmailAndPassword(e, p);
            action.then(() => hideAuthModal()).catch(err => alert(err.message));
        };

        window.signInWithGoogle = () => {
            const provider = new firebase.auth.GoogleAuthProvider();
            if ((typeof window.AndroidApp !== 'undefined') || /Android.*wv/.test(navigator.userAgent)) {
                auth.signInWithRedirect(provider);
            } else {
                auth.signInWithPopup(provider).then(() => hideAuthModal()).catch(e => alert(e.message));
            }
        };

        document.getElementById('dropdown-logout-btn').onclick = () => {
            if (window.AndroidApp) window.AndroidApp.clearAppCookies();
            auth.signOut().then(() => location.reload());
        };

        // Listeners
        document.getElementById('theme-toggle-btn').onclick = toggleTheme;
        window.onclick = (e) => {
            if (!document.getElementById('user-action-container').contains(e.target)) {
                document.getElementById('profile-dropdown').classList.add('hidden');
            }
        };

        // Initial Render
        updateThemeUI(localStorage.getItem('theme') || 'system');
        
        function startRealtimeListener() {
            if(!clientLedgersRef) return;
            clientLedgersRef.on('value', (snap) => {
                const val = snap.val();
                if (val) {
                    const local = clientLedgers.clients[DEFAULT_CLIENT_NAME];
                    clientLedgers = val;
                    if(!clientLedgers.clients) clientLedgers.clients = {};
                    clientLedgers.clients[DEFAULT_CLIENT_NAME] = local;
                }
                renderAllClientData();
            });
        }

        renderAllClientData();
    </script>
</body>
</html>
