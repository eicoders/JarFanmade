<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: { DEFAULT: '#2563EB', dark: '#3b82f6' },
                        background: { light: '#F8FAFC', dark: '#0B1120' }, // Darker background for OLED
                        surface: { light: '#ffffff', dark: '#1E293B' },
                        accent: { DEFAULT: '#10B981', dark: '#34d399' },
                        danger: { DEFAULT: '#EF4444', dark: '#f87171' },
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>

    <script>
        (function() {
            function applySystemTheme() {
                if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
            }
            applySystemTheme();
            window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', applySystemTheme);
        })();
    </script>

    <style>
        /* Mobile Optimizations */
        body { -webkit-tap-highlight-color: transparent; }
        .glass-header { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .dark .glass-header { background: rgba(15, 23, 42, 0.95); }
        
        /* Smooth Scrolling */
        html { scroll-behavior: smooth; }
        
        /* Custom Scrollbar for lists */
        .history-scroll::-webkit-scrollbar { width: 4px; }
        .history-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 2px; }
        .dark .history-scroll::-webkit-scrollbar-thumb { background: #475569; }
    </style>
</head>

<body class="bg-background-light dark:bg-background-dark text-gray-900 dark:text-gray-100 transition-colors duration-300 min-h-screen flex flex-col">

    <header id="main-header" class="fixed top-0 w-full z-40 glass-header border-b border-gray-200 dark:border-gray-800 transition-colors duration-300 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 h-14 flex justify-between items-center">
            <div class="flex items-center gap-2">

                <h1 class="text-lg font-bold tracking-tight uppercase text-gray-800 dark:text-white">Jar Ledger</h1>
            </div>
            
            <div class="relative">

                    <svg id="default-user-icon" class="w-full h-full p-1.5 text-gray-500 dark:text-gray-400" fill="currentColor" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>

            </div>

                <button onclick="signInWithGoogle()" class="w-full flex items-center justify-center gap-2 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 py-2.5 rounded-xl font-bold text-gray-700 dark:text-white hover:bg-gray-50 dark:hover:bg-gray-700">
                    <svg class="w-5 h-5" viewBox="0 0 18 18"><path d="M17.64 9.2045c0-.6381-.0573-1.2518-.1698-1.8409H9v3.4818h4.8436c-.2086 1.125-.8427 2.0782-1.7959 2.7164v2.26h2.9082c1.7018-1.5668 2.68-3.8732 2.68-6.6191z" fill="#4285F4"/><path d="M9 18c2.43 0 4.47-.8032 5.96-2.1764L12.0518 13.56c-.8032.5409-1.8395.8618-3.0518.8618-2.3441 0-4.3282-1.5818-5.0359-3.7109H.9v2.33C2.3909 15.9832 5.4282 18 9 18z" fill="#34A853"/><path d="M3.9641 10.71c-.1818-.5409-.2836-1.1164-.2836-1.71s.1018-1.1691.2836-1.71V4.95H.9C.3273 6.1364 0 7.5232 0 9s.3273 2.8636.9 4.05l3.0641-2.33z" fill="#FBBC05"/><path d="M9 3.5782c1.3236 0 2.5082.4555 3.4409 1.3536l2.5809-2.5809C13.46.8559 11.4236 0 9 0 5.4282 0 2.3909 2.0168.9 5.04L3.9641 7.37c.7077-2.1291 2.6918-3.7918 5.0359-3.7918z" fill="#EA4335"/></svg>

                </button>
                <div class="text-center text-xs text-gray-400 uppercase font-bold">Or Email</div>

    <div id="custom-alert-backdrop" class="fixed inset-0 bg-black/80 z-[60] hidden items-center justify-center p-4">
        <div class="bg-white dark:bg-gray-900 w-full max-w-xs rounded-xl shadow-2xl border border-gray-200 dark:border-gray-700 overflow-hidden text-center p-5">
            <h3 id="alert-title" class="text-lg font-bold text-gray-900 dark:text-white mb-2">Alert</h3>
            <p id="alert-message" class="text-gray-600 dark:text-gray-300 text-sm mb-4">Message</p>
            <input type="text" id="alert-input" class="hidden w-full mb-4 p-2 bg-gray-50 dark:bg-gray-800 border rounded-lg text-sm">
            <div class="flex gap-2 justify-center">
                <button id="alert-cancel-btn" class="hidden px-4 py-2 rounded-lg bg-gray-200 dark:bg-gray-700 text-xs font-bold text-gray-700 dark:text-white">Cancel</button>
                <button id="alert-ok-btn" class="flex-grow px-4 py-2 rounded-lg bg-primary text-white text-sm font-bold">OK</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCG9w-pUJq9FopmIUUPLUVMc03P84Rblgw",
            authDomain: "jar-ledger.firebaseapp.com",
            databaseURL: "https://jar-ledger-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "jar-ledger",
            storageBucket: "jar-ledger.firebasestorage.app",
            messagingSenderId: "915159281904",
            appId: "1:915159281904:web:4f3d5c940a03c4b525d235",
            measurementId: "G-YB740FJBBG"
        };

        let database, auth;
        let currentUserId = null;
        let clientLedgersRef = null;
        const DEFAULT_CLIENT_NAME = 'Default Client';
        
        // Local Storage Default Data
        let localData = JSON.parse(localStorage.getItem('jarLedgerLocal')) || {
            clients: { [DEFAULT_CLIENT_NAME]: { tasks: [], payments: [], settings: { hourlyRate: 150 } } },
            activeClientName: DEFAULT_CLIENT_NAME
        };

        // Initialize
        try {
            firebase.initializeApp(firebaseConfig);
            database = firebase.database();
            auth = firebase.auth();
        } catch (e) { console.error(e); }

        // --- UI VARIABLES ---
        const clientLedgers = { activeClientName: null, clients: {} };
        let isLoginMode = true;

        // --- ALERTS & MODALS ---
        const alertBackdrop = document.getElementById('custom-alert-backdrop');
        const alertInput = document.getElementById('alert-input');
        
        function showModal(type, title, msg, placeholder = "") {
            return new Promise(resolve => {
                document.getElementById('alert-title').textContent = title;
                document.getElementById('alert-message').textContent = msg;
                alertBackdrop.classList.remove('hidden');
                alertBackdrop.classList.add('flex');
                alertInput.classList.add('hidden');
                document.getElementById('alert-cancel-btn').classList.add('hidden');
                
                const btnOk = document.getElementById('alert-ok-btn');
                const btnCancel = document.getElementById('alert-cancel-btn');

                if(type === 'prompt') {
                    alertInput.classList.remove('hidden');
                    alertInput.value = '';
                    alertInput.placeholder = placeholder;
                    btnCancel.classList.remove('hidden');
                    alertInput.focus();
                    btnOk.onclick = () => { closeAlert(); resolve(alertInput.value); };
                } else if(type === 'confirm') {
                    btnCancel.classList.remove('hidden');
                    btnOk.onclick = () => { closeAlert(); resolve(true); };
                    btnCancel.onclick = () => { closeAlert(); resolve(false); };
                } else {
                    btnOk.onclick = () => { closeAlert(); resolve(true); };
                }
                btnCancel.onclick = () => { closeAlert(); resolve(false); };
            });
        }
        function closeAlert() { alertBackdrop.classList.add('hidden'); alertBackdrop.classList.remove('flex'); }

        // --- AUTH LOGIC ---
        const authModal = document.getElementById('auth-modal-backdrop');
        const toggleLink = document.getElementById('auth-toggle-link');
        
        function showAuthModal() { authModal.classList.remove('hidden'); authModal.classList.add('flex'); }
        function hideAuthModal() { authModal.classList.add('hidden'); authModal.classList.remove('flex'); }

        toggleLink.addEventListener('click', () => {
            isLoginMode = !isLoginMode;
            document.getElementById('auth-title').textContent = isLoginMode ? "Log In" : "Create Account";
            document.getElementById('auth-submit-btn').textContent = isLoginMode ? "Log In" : "Create Account";
            toggleLink.textContent = isLoginMode ? "Create Account" : "Log In";
            document.getElementById('signup-fields').classList.toggle('hidden', isLoginMode);
            document.getElementById('password-hint').classList.toggle('hidden', isLoginMode);
        });

        document.getElementById('auth-submit-btn').addEventListener('click', async () => {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-password').value;
            if(!email || !pass) return showModal('info', 'Error', 'Enter fields');
            
            try {
                if(isLoginMode) {
                    const cred = await auth.signInWithEmailAndPassword(email, pass);
                    if(!cred.user.emailVerified) {
                        auth.signOut();
                        return showModal('info', 'Verify Email', 'Please check your inbox.');
                    }
                } else {
                    const fname = document.getElementById('auth-fname').value;
                    if(!fname) return showModal('info', 'Error', 'Name required');
                    const cred = await auth.createUserWithEmailAndPassword(email, pass);
                    await cred.user.updateProfile({ displayName: fname });
                    await cred.user.sendEmailVerification();
                    showModal('success', 'Sent', 'Verification link sent!');
                    auth.signOut();
                }
                hideAuthModal();
            } catch(e) { showModal('error', 'Error', e.message); }
        });

        function signInWithGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            const isApp = (typeof window.AndroidApp !== 'undefined') || /Android.*wv/.test(navigator.userAgent);
            isApp ? auth.signInWithRedirect(provider) : auth.signInWithPopup(provider).catch(e => showModal('error', 'Error', e.message));
        }

        // --- CORE LOGIC ---
        auth.onAuthStateChanged(user => {
            const status = document.getElementById('sync-status');
            const logoutText = document.getElementById('logout-btn-text');
            const userName = document.getElementById('user-name-display');
            const userEmail = document.getElementById('user-email-display');

            if (user) {
                if(!user.emailVerified && user.providerData[0].providerId === 'password') return;
                
                currentUserId = user.uid;
                status.textContent = "Cloud Sync";
                status.classList.replace('bg-gray-100', 'bg-green-100');
                status.classList.replace('text-gray-500', 'text-green-600');
                logoutText.textContent = "Log Out";
                userName.textContent = user.displayName || "User";
                userEmail.textContent = user.email;

                if(user.photoURL) {
                    document.getElementById('user-profile-img').src = user.photoURL;
                    document.getElementById('user-profile-img').classList.remove('hidden');
                    document.getElementById('default-user-icon').classList.add('hidden');
                }

                clientLedgersRef = database.ref(`users/${currentUserId}/clientLedgers`);
                clientLedgersRef.on('value', snap => {
                    const data = snap.val() || { clients: {}, activeClientName: null };
                    // Merge Cloud Data
                    clientLedgers.clients = data.clients || {};
                    clientLedgers.activeClientName = data.activeClientName || Object.keys(clientLedgers.clients)[0] || null;
                    renderUI();
                });
            } else {
                // GUEST MODE RESTORED
                currentUserId = null;
                status.textContent = "Local Device";
                status.classList.replace('bg-green-100', 'bg-gray-100');
                status.classList.replace('text-green-600', 'text-gray-500');
                logoutText.textContent = "Log In / Sync";
                userName.textContent = "Guest User";
                userEmail.textContent = "Data saved locally";
                
                // Load Local
                clientLedgers.clients = localData.clients;
                clientLedgers.activeClientName = localData.activeClientName;
                renderUI();
            }
        });

        // Save Logic (Cloud vs Local)
        function saveData() {
            if (currentUserId) {
                // Save Cloud
                const data = JSON.parse(JSON.stringify(clientLedgers));
                delete data.clients[DEFAULT_CLIENT_NAME]; // Don't sync default client
                clientLedgersRef.set(data);
            } else {
                // Save Local
                localData = JSON.parse(JSON.stringify(clientLedgers));
                localStorage.setItem('jarLedgerLocal', JSON.stringify(localData));
            }
        }

        // --- RENDER UI (Fixed Layout & formatting) ---
        function renderUI() {
            const active = clientLedgers.activeClientName;
            const clientData = active ? clientLedgers.clients[active] : null;

            // 1. Selector
            const sel = document.getElementById('client-selector');
            sel.innerHTML = '';
            const list = Object.keys(clientLedgers.clients);
            
            if(list.length === 0 && !currentUserId) {
                // Create default if empty
                clientLedgers.clients[DEFAULT_CLIENT_NAME] = { tasks:[], payments:[], settings:{hourlyRate:150} };
                clientLedgers.activeClientName = DEFAULT_CLIENT_NAME;
                saveData();
                return renderUI();
            }

            list.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c; opt.textContent = c;
                opt.selected = c === active;
                sel.appendChild(opt);
            });

            // 2. Render Stats (2x2 Grid on Mobile)
            const statsDiv = document.getElementById('stats-container');
            if (clientData) {
                const tasks = Object.values(clientData.tasks || {});
                const payments = Object.values(clientData.payments || {});
                const rate = clientData.settings.hourlyRate || 0;

                const totalSec = tasks.reduce((acc, t) => acc + (t.hours*3600 + t.minutes*60 + t.seconds), 0);
                const billed = (totalSec / 3600) * rate;
                const received = payments.reduce((acc, p) => acc + p.amount, 0);
                const balance = billed - received;

                // Time Formatter (Hr:Min:Sec)
                const h = Math.floor(totalSec / 3600);
                const m = Math.floor((totalSec % 3600) / 60);
                const s = Math.floor(totalSec % 60);
                const timeStr = `${h}h ${m}m ${s}s`;

                const cardClass = "p-3 rounded-xl bg-white dark:bg-surface-dark border border-gray-200 dark:border-gray-700 shadow-sm flex flex-col justify-center";
                const currency = (v) => new Intl.NumberFormat('en-IN', { style: 'currency', currency: 'INR', maximumFractionDigits: 0 }).format(v);

                statsDiv.innerHTML = `
                    <div class="${cardClass}">
                        <span class="text-[10px] font-bold text-gray-400 uppercase">Hourly Rate</span>
                        <span class="text-lg font-bold text-gray-800 dark:text-white">${currency(rate)}</span>
                    </div>
                    <div class="${cardClass}">
                        <span class="text-[10px] font-bold text-gray-400 uppercase">Total Time</span>
                        <span class="text-lg font-bold text-primary">${timeStr}</span>
                    </div>
                    <div class="${cardClass}">
                        <span class="text-[10px] font-bold text-gray-400 uppercase">Billed Value</span>
                        <span class="text-lg font-bold text-gray-800 dark:text-white">${currency(billed)}</span>
                    </div>
                    <div class="${cardClass} ${balance < 0 ? 'bg-red-50 dark:bg-red-900/20' : 'bg-green-50 dark:bg-green-900/20'}">
                        <span class="text-[10px] font-bold uppercase ${balance < 0 ? 'text-red-500' : 'text-green-500'}">Net Balance</span>
                        <span class="text-lg font-bold ${balance < 0 ? 'text-red-600' : 'text-green-600'}">${currency(Math.abs(balance))} ${balance < 0 ? 'Due' : 'Cr'}</span>
                    </div>
                `;
                document.getElementById('hourly-rate-input').value = rate;

                // 3. History Lists (Indexed 1., 2., 3.)
                renderHistoryList('task-list', tasks, (t, i) => `
                    <div class="flex justify-between items-center p-2.5 bg-gray-50 dark:bg-gray-800/50 rounded-lg border border-gray-100 dark:border-gray-700">
                        <div>
                            <div class="text-sm font-bold text-gray-800 dark:text-gray-200"><span class="text-primary mr-2">#${i+1}</span>${t.hours}h ${t.minutes}m ${t.seconds}s</div>
                            <div class="text-[10px] text-gray-400">${new Date(t.timestamp).toLocaleDateString()}</div>
                        </div>
                        <div class="flex items-center gap-3">
                            <span class="text-xs font-bold text-gray-600 dark:text-gray-400">${currency((t.hours + t.minutes/60 + t.seconds/3600) * rate)}</span>
                            <button onclick="deleteItem('tasks', ${t.timestamp})" class="text-red-400"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>
                        </div>
                    </div>
                `);

                renderHistoryList('payment-list', payments, (p, i) => `
                    <div class="flex justify-between items-center p-2.5 bg-gray-50 dark:bg-gray-800/50 rounded-lg border border-gray-100 dark:border-gray-700">
                        <div>
                            <div class="text-sm font-bold text-accent"><span class="text-gray-400 mr-2">#${i+1}</span>${currency(p.amount)}</div>
                            <div class="text-[10px] text-gray-400">${new Date(p.timestamp).toLocaleDateString()}</div>
                        </div>
                        <button onclick="deleteItem('payments', ${p.timestamp})" class="text-red-400"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>
                    </div>
                `);

            } else {
                statsDiv.innerHTML = '<p class="col-span-full text-center text-gray-400 text-sm py-4">No Client Selected</p>';
            }
        }

        function renderHistoryList(id, items, template) {
            const el = document.getElementById(id);
            if (items.length === 0) {
                el.innerHTML = '<p class="text-center text-xs text-gray-400 py-4">No entries found</p>';
            } else {
                // Sort descending but number ascending visually if desired? usually #1 is oldest or newest. 
                // Let's show #1 as newest entry for easy reference
                const sorted = items.sort((a,b) => b.timestamp - a.timestamp);
                el.innerHTML = sorted.map((item, idx) => template(item, items.length - 1 - idx)).join('');
            }
        }

        // --- ACTIONS ---
        document.getElementById('client-selector').addEventListener('change', (e) => {
            clientLedgers.activeClientName = e.target.value;
            saveData(); renderUI();
        });
        
        document.getElementById('user-action-button').addEventListener('click', () => {
            if(!currentUserId) return showAuthModal();
            document.getElementById('profile-dropdown').classList.toggle('hidden');
        });
        
        document.getElementById('dropdown-logout-btn').addEventListener('click', () => {
            if(currentUserId) {
                if(confirm("Log Out?")) {
                     if (window.AndroidApp) window.AndroidApp.clearAppCookies();
                     auth.signOut().then(()=>location.reload());
                }
            } else {
                showAuthModal();
            }
        });

        window.addNewClient = async () => {
            const name = await showModal('prompt', 'New Client', 'Enter Name:', 'Client Name');
            if(name) {
                if(clientLedgers.clients[name]) return showModal('info','Error','Name exists');
                clientLedgers.clients[name] = { tasks:[], payments:[], settings:{hourlyRate:150}};
                clientLedgers.activeClientName = name;
                saveData(); renderUI();
            }
        }
        window.addTask = () => {
            const h = Number(document.getElementById('task-hr-input').value);
            const m = Number(document.getElementById('task-min-input').value);
            const s = Number(document.getElementById('task-sec-input').value);
            if(h+m+s === 0) return;
            const active = clientLedgers.activeClientName;
            if(!clientLedgers.clients[active].tasks) clientLedgers.clients[active].tasks = [];
            clientLedgers.clients[active].tasks.push({ hours:h, minutes:m, seconds:s, timestamp: Date.now() });
            // Clear
            document.getElementById('task-hr-input').value = '';
            document.getElementById('task-min-input').value = '';
            document.getElementById('task-sec-input').value = '';
            saveData(); renderUI();
        }
        window.addPayment = () => {
            const v = Number(document.getElementById('payment-amount-input').value);
            if(!v) return;
            const active = clientLedgers.activeClientName;
            if(!clientLedgers.clients[active].payments) clientLedgers.clients[active].payments = [];
            clientLedgers.clients[active].payments.push({ amount:v, timestamp: Date.now() });
            document.getElementById('payment-amount-input').value = '';
            saveData(); renderUI();
        }
        window.deleteItem = async (type, ts) => {
            if(await showModal('confirm', 'Delete', 'Remove this entry?')) {
                const active = clientLedgers.activeClientName;
                let list = clientLedgers.clients[active][type];
                if(!Array.isArray(list)) list = Object.values(list);
                clientLedgers.clients[active][type] = list.filter(i => i.timestamp !== ts);
                saveData(); renderUI();
            }
        }
        window.renameClient = async () => {
            const old = clientLedgers.activeClientName;
            const name = await showModal('prompt', 'Rename', `Rename ${old} to:`, old);
            if(name && name !== old && !clientLedgers.clients[name]) {
                clientLedgers.clients[name] = clientLedgers.clients[old];
                delete clientLedgers.clients[old];
                clientLedgers.activeClientName = name;
                saveData(); renderUI();
            }
        }
        window.deleteClient = async () => {
            if(await showModal('confirm', 'Delete Client', 'Delete all data for this client?')) {
                delete clientLedgers.clients[clientLedgers.activeClientName];
                clientLedgers.activeClientName = Object.keys(clientLedgers.clients)[0] || null;
                saveData(); renderUI();
            }
        }
        window.updateHourlyRate = () => {
            const r = Number(document.getElementById('hourly-rate-input').value);
            if(r) {
                clientLedgers.clients[clientLedgers.activeClientName].settings.hourlyRate = r;
                saveData(); renderUI();
            }
        }

    </script>
</body>
</html>
